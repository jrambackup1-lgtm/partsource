# Fly.io deployment for the PartSource Zoro pricing scraper.
#
# One-time setup:
#   flyctl launch --no-deploy   # creates the app + this file's [app] name
#   flyctl deploy                # builds + deploys
#
# The Dockerfile lives at web/scripts/Dockerfile (build context = repo root).
# fly.toml must sit at repo root for `flyctl deploy` to find it.

app = "partsource-scraper"
primary_region = "iad"

[build]
  dockerfile = "web/scripts/Dockerfile"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 25

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
