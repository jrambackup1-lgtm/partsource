# ARCHIVED legacy-ingestion Fly.io config. Not a production deployment path.
#
# Historical setup notes (not a supported production path):
#   flyctl launch --no-deploy   # creates the app + this file's [app] name
#   flyctl deploy                # builds + deploys
#
# The archived service remains fail-closed unless its explicit opt-in is set.

app = "partsource-scraper"
primary_region = "iad"

[build]
  dockerfile = "archive/legacy-ingestion/Dockerfile"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = true
  auto_start_machines = false
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 25

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
