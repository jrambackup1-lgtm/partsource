name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Test
        run: npm test

      - name: Workflow contracts
        run: |
          npx tsx scripts/test-production-monitoring.ts
          npx tsx scripts/test-release-truth.ts

      - name: Build
        run: npm run build

      - name: Install browser
        run: npx playwright install --with-deps chromium

      - name: Browser smoke
        run: npm run test:browser
