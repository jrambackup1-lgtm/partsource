name: Production monitoring

on:
  workflow_call:
    inputs:
      expected_sha:
        description: Full commit SHA expected after a deployment
        required: false
        type: string
        default: ""
  schedule:
    - cron: "17,47 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-production-routes:
    runs-on: ubuntu-latest
    env:
      EXPECTED_SHA: ${{ inputs.expected_sha }}
      RELEASE_CHECK_NONCE: ${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Check production status and content
        shell: bash
        run: |
          set -euo pipefail

          release_body="$(mktemp)"
          curl --fail --silent --show-error --location --retry 2 --max-time 30 \
            --header "Cache-Control: no-cache, no-store, max-age=0, must-revalidate" \
            --header "Pragma: no-cache" \
            --output "$release_body" \
            "https://jrambackup1-lgtm.github.io/partsource/release.json?check=${RELEASE_CHECK_NONCE}"
          RELEASE_FILE="$release_body" node <<'NODE'
          const fs = require('node:fs');
          const metadata = JSON.parse(fs.readFileSync(process.env.RELEASE_FILE, 'utf8'));
          const expectedSha = process.env.EXPECTED_SHA.trim();
          if (JSON.stringify(Object.keys(metadata).sort()) !== JSON.stringify(['builtAt', 'sha'])) {
            throw new Error('release.json must contain only builtAt and sha');
          }
          if (typeof metadata.sha !== 'string' || !/^[0-9a-fA-F]{40}$/.test(metadata.sha)) {
            throw new Error('release.json sha must be a full 40-character hexadecimal Git SHA');
          }
          if (typeof metadata.builtAt !== 'string' || Number.isNaN(Date.parse(metadata.builtAt)) || new Date(metadata.builtAt).toISOString() !== metadata.builtAt) {
            throw new Error('release.json builtAt must be an ISO 8601 UTC timestamp');
          }
          if (expectedSha && metadata.sha !== expectedSha) {
            throw new Error(`production SHA ${metadata.sha} does not match deploy SHA ${expectedSha}`);
          }
          console.log(`OK release ${metadata.sha} built ${metadata.builtAt}`);
          NODE
          rm -f "$release_body"

          checks=(
            "https://jrambackup1-lgtm.github.io/partsource/|200|PartSource.io"
            "https://jrambackup1-lgtm.github.io/partsource/parts/DIN912-M3X10|200|DIN912-M3X10"
            "https://jrambackup1-lgtm.github.io/partsource/?tab=bom|200|PartSource.io"
            "https://jrambackup1-lgtm.github.io/partsource/reference|200|Engineering Reference"
            "https://jrambackup1-lgtm.github.io/partsource/sitemap.xml|200|<urlset"
            "https://jrambackup1-lgtm.github.io/partsource/robots.txt|200|User-agent: *"
            "https://jrambackup1-lgtm.github.io/partsource/definitely-not-a-real-route|404|PartSource.io"
          )

          for check in "${checks[@]}"; do
            IFS='|' read -r url expected_status expected_content <<< "$check"
            body="$(mktemp)"
            if [[ "$expected_status" == "200" ]]; then
              actual_status="$(curl --fail --silent --show-error --location --retry 2 --max-time 30 --output "$body" --write-out '%{http_code}' "$url")"
            else
              actual_status="$(curl --silent --show-error --location --retry 2 --max-time 30 --output "$body" --write-out '%{http_code}' "$url")"
            fi
            test "$actual_status" = "$expected_status"
            grep --fixed-strings --quiet "$expected_content" "$body"
            echo "OK $actual_status $url ($expected_content)"
            rm -f "$body"
          done

  check-rendered-production:
    needs: check-production-routes
    runs-on: ubuntu-latest
    env:
      PRODUCTION_BASE_URL: https://jrambackup1-lgtm.github.io/partsource/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Install browser
        run: npx playwright install --with-deps chromium
        working-directory: web

      - name: Check rendered production routes
        run: npx playwright test tests/browser/production-smoke.spec.ts
        working-directory: web
