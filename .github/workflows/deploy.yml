name: Deploy static content to Pages

on:
  push:
    branches: ["master"]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
          
      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Test
        run: npm run test
        working-directory: web

      - name: Build
        # VITE_SCRAPER_URL is the hosted Zoro-pricing scraper (Fly.io / Render).
        # Configure it as a repository variable (Settings -> Secrets and variables ->
        # Actions -> Variables). When unset, the frontend falls back to estimated prices.
        env:
          VITE_SCRAPER_URL: ${{ vars.VITE_SCRAPER_URL }}
        run: npm run build
        working-directory: web

      - name: Add SPA fallback
        # GitHub Pages serves 404.html for unknown paths; copying index.html
        # lets deep links like /partsource/parts/91251A242 boot the router.
        run: cp web/dist/index.html web/dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'web/dist'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
