name: Deploy static content to Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  verify:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Test
        run: npm test

      - name: Workflow contracts
        run: |
          npx tsx scripts/test-production-monitoring.ts
          npx tsx scripts/test-release-truth.ts

      - name: Build
        run: npm run build

      - name: Install browser
        run: npx playwright install --with-deps chromium

      - name: Browser smoke
        run: npm run test:browser

      - name: Generate release metadata
        env:
          RELEASE_SHA: ${{ github.sha }}
        run: npx tsx scripts/generate-release-metadata.ts

      - name: Upload commit-tied Pages artifact
        id: pages-artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: pages-${{ github.sha }}
          path: web/dist
          retention-days: 1

      - name: Record artifact identity
        shell: bash
        run: |
          echo "Commit: $GITHUB_SHA" >> "$GITHUB_STEP_SUMMARY"
          echo "Artifact: pages-$GITHUB_SHA" >> "$GITHUB_STEP_SUMMARY"
          echo "Artifact ID: ${{ steps.pages-artifact.outputs.artifact_id }}" >> "$GITHUB_STEP_SUMMARY"
        working-directory: .

  deploy:
    needs: verify
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy tested artifact to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: pages-${{ github.sha }}

  smoke:
    needs: deploy
    uses: ./.github/workflows/production-monitoring.yml
    with:
      expected_sha: ${{ github.sha }}
